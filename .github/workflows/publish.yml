name: Release & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['packages/create-slaide--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Copy template into package
        run: |
          cp -r template/ packages/create-slaide/template/
          rm -rf packages/create-slaide/template/node_modules packages/create-slaide/template/dist packages/create-slaide/template/package-lock.json

      - name: Publish
        run: npm publish --provenance
        working-directory: packages/create-slaide
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
